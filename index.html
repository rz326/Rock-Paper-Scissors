<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <title>Rock Paper Scissors Setup</title>
    </head>
    <body>
        <header>
            <h1>Rock Paper Scissors</h1>
        </header>

        <div class="side-wrapper left-wrapper">
            <img src="images/you.jpg" alt="Player image" class="side-image">
            <p class="side-label"><span id="underline1">You</span></p>
        </div>

        <div class="side-wrapper right-wrapper">
            <img src="images/computer.jpg" alt="Computer image" class="side-image">
            <p class="side-label"><span id="underline2">The Computer</span></p>
        </div>

        <p class="vs-text"><span id="underline3">VS</span></p>

        <div class="setup-container">
            <form id="setup-form" class="setup-form">
                <h2>Game Setup</h2>

                <label for="player-name">Your Name:</label>
                <input type="text" id="player-name" name="player-name" required>

                <label for="computer-name">Computer's Nickname:</label>
                <input type="text" id="computer-name" name="computer-name" required>

                <label for="target-score">Target Score:</label>
                <input type="number" id="target-score" name="target-score" min="1" required>

                <button type="submit">Save and Play!</button>
            </form>
        </div>

        <script src="setup.js"></script>
    </body>
</html>

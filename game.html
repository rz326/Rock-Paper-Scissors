<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <title>Rock Paper Scissors Game</title>
    </head>
    <body>
        <header>
            <h1>Rock Paper Scissors</h1>
        </header>
        
        <div class="side-wrapper left-wrapper">
            <img src="images/you.jpg" alt="Player image" class="side-image">
            <p class="side-label"><span id="underline1">You</span></p>
        </div>

        <div class="side-wrapper right-wrapper">
            <img src="images/computer.jpg" alt="Computer image" class="side-image">
            <p class="side-label"><span id="underline2">The Computer</span></p>
        </div>

        <p class="vs-text"><span id="underline3">VS</span></p>

        <div class="score-board">
            <div id="user-label" class="badge">User</div>
            <div id="computer-label" class="badge">Comp</div>
            <span id="user-score">0</span>:<span id="computer-score">0</span>
        </div>

        <div class="result">
            <p>Don't Forget: Paper Covers Rock.</p>
        </div>

        <div class="choices">
            <div class="choice" id="r">
                <img src="images/rock.png" alt="Rock">
            </div>
            <div class="choice" id="p">
                <img src="images/paper.png" alt="Paper">
            </div>
            <div class="choice" id="s">  
                <img src="images/scissors.png" alt="Scissors">
            </div>
        </div>

        <p id="action-message">Make Your Move.</p>
        <p id="target-score-display">Target Score: 0</p>

        <div id="winner-dialog" class="dialog hidden">
            <div class="dialog-content">
                <p id="winner-message"></p>
                <div class="dialog-buttons">
                    <button id="play-again-button">Play Again</button>
                    <button id="reset-button">Reset</button>
                </div>
            </div>
        </div>

        <script src="game.js" charset="utf-8"></script>
    </body>
</html>
